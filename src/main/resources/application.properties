# Web server: listen on all interfaces so browser can reach it (localhost, 127.0.0.1, or machine IP)
server.port=8080
server.address=0.0.0.0

# Default LLM: set in WebApplication.main() from .env. Prefer Groq (GROQ_API_KEY or GROK_API_KEY) → api.groq.com, model llama-3.3-70b-versatile; else OpenAI (OPENAI_API_KEY). Do not set api-key/base-url here or they may override.

# Max tokens the model can generate per response (avoids truncated replies; Groq/OpenAI default can be low)
spring.ai.openai.chat.options.max-tokens=4096

# Retry on OpenAI 429 (rate limit) with backoff
spring.ai.retry.on-client-errors=true
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2s
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=5s

# Disable only non-chat OpenAI auto-configs so the app starts without them; Chat is enabled for MCP when key is set
spring.autoconfigure.exclude=\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
